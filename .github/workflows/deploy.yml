name: Deploy to VPS

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
        log-public-key: false
    
    - name: Add VPS to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 137.184.144.19 >> ~/.ssh/known_hosts
    
    - name: Deploy to VPS
      run: |
        ssh alfred-deploy@137.184.144.19 'cd /var/www/bazaar && sudo ./deploy/deploy.sh'
    
    - name: Verify deployment
      run: |
        sleep 5
        curl -sf http://137.184.144.19:8765/api/health || exit 1
        echo "✓ Deployment verified"
