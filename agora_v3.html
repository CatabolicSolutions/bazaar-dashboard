<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGORA — Bazaar of Fortunes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #050a14;
  --bg-surface: #0a1120;
  --bg-card: #0f1a2e;
  --bg-card-hover: #14223a;
  --border: #1a2a44;
  --border-light: #253a5c;
  --text: #dce2ee;
  --text-2: #8898b0;
  --text-3: #4a5e7a;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --green-border: rgba(34,197,94,0.2);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --red-border: rgba(239,68,68,0.2);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.08);
  --cyan: #06b6d4;
  --purple: #818cf8;
  --radius: 10px;
  --radius-sm: 6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg-deep);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:13px;min-height:100vh;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono','SF Mono',monospace}
.app{max-width:1440px;margin:0 auto;padding:24px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--purple),var(--cyan));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
.hdr h1{font-size:17px;font-weight:600;color:var(--text)}
.hdr h1 span{color:var(--text-3);font-weight:400}
.hdr-r{display:flex;align-items:center;gap:14px}
.svc-dots{display:flex;gap:6px}
.svc-dot{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;background:var(--bg-card);border:1px solid var(--border)}
.svc-dot .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-live{background:var(--green);box-shadow:0 0 5px rgba(34,197,94,.35)}
.dot-down{background:var(--red);box-shadow:0 0 5px rgba(239,68,68,.35)}
.dot-stale{background:var(--amber);box-shadow:0 0 5px rgba(245,158,11,.35)}
.dot-off{background:var(--text-3)}
.ts{font-size:11px;color:var(--text-3);font-family:'JetBrains Mono',monospace}

# -- sections --
.sec{margin-bottom:22px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-ttl{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--text)}
.sec-sub{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-body{padding:14px 16px}

# -- grids --
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

# -- price cards --
.pc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;text-align:center;transition:border-color .15s}
.pc:hover{border-color:var(--border-light)}
.pc-sym{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:3px}
.pc-pr{font-size:23px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace}
.pc-pr.sm{font-size:18px}
.pc-params{font-size:9px;color:var(--text-3);margin-top:5px;font-family:'JetBrains Mono',monospace}

# -- signal --
.sig{display:none;padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:8px;gap:12px}
.sig.long{display:flex;background:var(--green-bg);border:1px solid var(--green-border)}
.sig.short{display:flex;background:var(--red-bg);border:1px solid var(--red-border)}
.sig-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sig-ico.long{background:var(--green);color:#030712}
.sig-ico.short{background:var(--red);color:#030712}
.sig-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.sig-dir{font-size:13px;font-weight:600}
.sig-mkt{font-size:11px;color:var(--text-2)}
.sig-cf{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600}
.sig-cf.HIGH{background:var(--green);color:#030712}
.sig-cf.MEDIUM{background:var(--amber);color:#030712}
.sig-cf.LOW{background:var(--text-3);color:var(--text-2)}
.sig-det{font-size:11px;color:var(--text-2);margin-top:4px;line-height:1.4}
.sig-meta{display:flex;gap:18px;margin-top:8px;font-size:10px;color:var(--text-3);font-family:'JetBrains Mono',monospace}

# -- pending --
.pend{display:none;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;align-items:center;gap:10px;background:var(--amber-bg);border:1px solid rgba(245,158,11,.18)}
.pend.v{display:flex}
.pend-tag{background:var(--amber);color:#030712;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase}
.pend-txt{font-size:11px;color:var(--text)}
.pend-id{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3)}

# -- guardrails --
.gr{display:flex;gap:14px;padding:6px 0 0;flex-wrap:wrap}
.gr-i{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text-3);font-family:'JetBrains Mono',monospace}
.gr-i .tag{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.gr-i .tag.live{background:var(--green);color:#030712}
.gr-i .tag.dry{background:var(--text-3);color:#030712}

# -- table --
.tw{overflow-x:auto}
.tw table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px}
.tw th{position:sticky;top:0;background:var(--bg-card);text-align:left;padding:7px 10px;font-size:9px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap}
.tw td{padding:6px 10px;border-bottom:1px solid rgba(26,42,68,.35);white-space:nowrap;font-variant-numeric:tabular-nums}
.tw tr:last-child td{border-bottom:none}
.tw tr:hover td{background:var(--bg-card-hover)}

# -- stat rows --
.sr{padding:5px 12px;display:flex;justify-content:space-between;align-items:center;font-size:11px;border-bottom:1px solid rgba(26,42,68,.3)}
.sr:last-child{border-bottom:none}
.sr-l{color:var(--text-3)}
.sr-v{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;color:var(--text)}
.g{color:var(--green)}
.r{color:var(--red)}
.a{color:var(--amber)}

# -- position state --
.ps{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:500;white-space:nowrap}
.ps.damage_control{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.ps.active{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.ps.hedge{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,.15)}
.ps.monitoring{background:rgba(129,140,248,.08);color:var(--purple);border:1px solid rgba(129,140,248,.15)}

# -- empty --
.em{padding:36px;text-align:center;color:var(--text-3);font-size:12px;line-height:1.6}
.em-ico{font-size:26px;display:block;margin-bottom:8px;opacity:.45}
.em-sub{font-size:10px;color:var(--text-3);margin-top:4px;opacity:.6}

# -- loading --
.ld{display:flex;align-items:center;justify-content:center;padding:24px;gap:8px;color:var(--text-3);font-size:11px}
.sp{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

# -- scrollable --
.sc{max-height:420px;overflow-y:auto}

# -- exec log --
.log-line{padding:3px 12px;font-size:10px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid rgba(26,42,68,.2);color:var(--text-2)}
.log-line:last-child{border-bottom:none}
.log-line .ts2{color:var(--text-3);margin-right:8px}
.log-line .ev{color:var(--cyan)}
.log-line .ev.enter{color:var(--green)}
.log-line .ev.exit{color:var(--amber)}
.log-line .ev.rotate{color:var(--purple)}

@media(max-width:1024px){.g5{grid-template-columns:repeat(3,1fr)}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
@media(max-width:700px){.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.hdr{flex-direction:column;align-items:flex-start;gap:12px}.svc-dots{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="app">

  <!-- header -->
  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-logo">A</div>
      <h1>AGORA <span>· Bazaar of Fortunes</span></h1>
    </div>
    <div class="hdr-r">
      <div class="svc-dots" id="svc-dots"></div>
      <span class="ts" id="hdr-ts">—</span>
    </div>
  </div>

  <!-- CFM -->
  <div class="sec">
    <div class="sec-hdr">
      <div class="sec-ttl">⚡ Coinbase CFM — Active Sleeve</div>
      <span class="sec-sub" id="cfm-sub">—</span>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="g5" id="cfm-prices"></div>
        <div id="cfm-sig"></div>
        <div id="cfm-pend"></div>
        <div class="gr" id="cfm-gr"></div>
      </div>
    </div>
  </div>

  <!-- last exec + rotator -->
  <div class="g2">
    <!-- last execution -->
    <div class="sec" style="margin-bottom:0">
      <div class="sec-hdr">
        <div class="sec-ttl">📜 Recent CFM Execution</div>
        <span class="sec-sub" id="exec-sub">—</span>
      </div>
      <div class="card" id="exec-body">
        <div class="ld"><div class="sp"></div></div>
      </div>
    </div>
    <!-- rotator -->
    <div class="sec" style="margin-bottom:0">
      <div class="sec-hdr">
        <div class="sec-ttl">🔄 Uniswap Rotator — Compounder</div>
        <span class="sec-sub" id="rot-sub">—</span>
      </div>
      <div class="card" id="rot-body">
        <div class="ld"><div class="sp"></div></div>
      </div>
    </div>
  </div>

  <!-- tradier + positions -->
  <div class="g2" style="margin-top:22px">
    <div class="sec" style="margin-bottom:0">
      <div class="sec-hdr">
        <div class="sec-ttl">📋 Tradier — Options Leaders</div>
        <span class="sec-sub" id="trd-sub">—</span>
      </div>
      <div class="card" id="trd-body">
        <div class="ld"><div class="sp"></div></div>
      </div>
    </div>
    <div class="sec" style="margin-bottom:0">
      <div class="sec-hdr">
        <div class="sec-ttl">💼 Positions</div>
        <span class="sec-sub" id="pos-sub">—</span>
      </div>
      <div class="card" id="pos-body">
        <div class="ld"><div class="sp"></div></div>
      </div>
    </div>
  </div>

  <!-- rotator activity log -->
  <div class="sec" style="margin-top:22px">
    <div class="sec-hdr">
      <div class="sec-ttl">📊 Rotator Activity Log</div>
      <span class="sec-sub" id="log-sub">—</span>
    </div>
    <div class="card sc" id="log-body">
      <div class="ld"><div class="sp"></div></div>
    </div>
  </div>
</div>

<script>
// no fancy tricks. clean helpers.
var API = '/agora/api/agora';

var ASSETS = {
  "BIP-20DEC30-CDE":{n:"BTC",p:"0.10% sweep"},
  "ETP-20DEC30-CDE":{n:"ETH",p:"0.10% sweep"},
  "SLP-20DEC30-CDE":{n:"SOL",p:"0.15% sweep"},
  "GOL-27MAY26-CDE":{n:"GOLD",p:"0.05% sweep"},
  "MC-18JUN26-CDE":{n:"MAG7C",p:"0.08% sweep"}
};

var _N = -1; // elem counter
function E(){return document.getElementById(++_N<0?'notfound':'n'+_N)} // unused, keep for clarity
function id(s){return document.getElementById(s)}

function dot(cls){
  return '<span class="dot dot-'+cls+'"></span>';
}
function fmt$(v){
  if(v===undefined||v===null)return '—';
  return Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtPct(v){
  if(v===undefined||v===null)return '—';
  return (v>=0?'+':'')+Number(v).toFixed(2)+'%';
}
function age(iso){
  if(!iso)return '—';
  var s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<5)return 'just now';
  if(s<60)return Math.round(s)+'s ago';
  if(s<3600)return Math.round(s/60)+'m ago';
  if(s<86400)return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}

// safe fetch — returns null on HTML responses (nginx 502) or network errors
async function sf(url){
  try{
    var r=await fetch(url);
    var t=r.headers.get('content-type')||'';
    if(!t.includes('json')) return null;
    return await r.json();
  }catch(e){
    return null;
  }
}

function setDot(el,ok){
  if(!el)return;
  if(ok===true) el.innerHTML='<span class="dot dot-live"></span>';
  else if(ok===false) el.innerHTML='<span class="dot dot-down"></span>';
  else el.innerHTML='<span class="dot dot-off"></span>';
}

// ── CFM ──
async function rCFM(){
  var d=await sf(API+'/active-crypto');
  var ok=(d&&d.ok);
  setDot(id('dot-cfm'),ok);
  id('cfm-sub').textContent=ok?'Active':'Error'+(d?d.error?' ('+d.error+')':'':' (offline)');

  if(!ok){
    id('cfm-prices').innerHTML='<div class="em"><div class="em-ico">📡</div>CFM runner offline<div class="em-sub">check back shortly</div></div>';
    id('cfm-sig').innerHTML='';
    id('cfm-pend').innerHTML='';
    id('cfm-gr').innerHTML='';
    return;
  }

  // prices
  var mids=d.mids||{};
  var pH='';
  for(var pid in ASSETS){
    var a=ASSETS[pid],p=mids[pid];
    if(p===undefined) continue;
    var f=p>=100?fmt$(p):p>=1?p.toFixed(4):p.toFixed(6);
    var cls=p>=100?'':'sm';
    pH+='<div class="pc"><div class="pc-sym">'+a.n+'</div><div class="pc-pr '+cls+'">$'+f+'</div><div class="pc-params">'+a.p+'</div></div>';
  }
  id('cfm-prices').innerHTML=pH||'<div class="em"><div class="em-ico">📡</div>No price data</div>';

  // signal
  var sig=d.active_signal;
  var sEl=id('cfm-sig');
  if(sig&&sig.direction){
    var dir=sig.direction==='LONG'?'long':'short';
    sEl.innerHTML='<div class="sig '+dir+'"><div class="sig-ico '+dir+'">'+(dir==='long'?'▲':'▼')+'</div><div class="sig-cnt"><div class="sig-top"><span class="sig-dir">'+sig.direction+'</span><span class="sig-mkt">'+(sig.market||'')+'</span><span class="sig-cf '+(sig.confidence||'LOW')+'">'+(sig.confidence||'LOW')+'</span></div><div class="sig-det">'+(sig.signal_detail||'')+'</div><div class="sig-meta"><span>⤴ '+(sig.entry_zone||'—')+'</span><span>⛔ $'+(sig.stop||'—')+'</span><span>📊 '+(sig.volume_ratio||'—')+'x vol</span></div></div></div>';
  }else sEl.innerHTML='';

  // pending
  var pEl=id('cfm-pend');
  if(d.pending_trade){
    pEl.innerHTML='<div class="pend v"><span class="pend-tag">PENDING</span><span class="pend-txt">Active trade</span><span class="pend-id">'+d.pending_trade+'</span></div>';
  }else pEl.innerHTML='';

  // guardrails
  var g=d.guardrails||{};
  var live=d.live_trading_enabled;
  id('cfm-gr').innerHTML=
    '<span class="gr-i"><span class="tag '+(live?'live':'dry')+'">'+(live?'LIVE':'DRY')+'</span></span>'+
    '<span class="gr-i">Risk '+g.max_trade_risk_pct+'%</span>'+
    '<span class="gr-i">Lev '+g.max_leverage+'x</span>'+
    '<span class="gr-i">Max 1 pos</span>'+
    '<span class="gr-i">Loss limit '+g.max_daily_loss_pct+'%</span>';

  // time
  id('hdr-ts').textContent=age(d.heartbeat_updated_at);
}

// ── Last Execution ──
async function rExec(){
  var d=await sf(API+'/active-crypto');
  if(!d||!d.last_execution||!d.last_execution.executed){
    id('exec-body').innerHTML='<div class="em"><div class="em-ico">📜</div>No recent executions<div class="em-sub">next cycle will log here</div></div>';
    id('exec-sub').textContent='—';
    return;
  }
  var ex=d.last_execution;
  var dir=ex.direction||'NONE';
  var dirCls=dir==='SHORT'?'r':dir==='LONG'?'g':'';
  var H='<div class="sr"><span class="sr-l">Direction</span><span class="sr-v '+dirCls+'">'+dir+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Market</span><span class="sr-v">'+(ex.market||'—')+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Entry</span><span class="sr-v">$'+(ex.entry||'—')+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Size</span><span class="sr-v">$'+fmt$(ex.size_usd)+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Stop</span><span class="sr-v r">$'+(ex.stop||'—')+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Target 1</span><span class="sr-v g">'+(ex.target_1||'—')+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Target 2</span><span class="sr-v g">'+(ex.target_2||'—')+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Trigger</span><span class="sr-v" style="max-width:200px;overflow:hidden;text-overflow:ellipsis">'+(ex.setup_detail||'—')+'</span></div>';
  H+='<div class="sr"><span class="sr-l">Submitted</span><span class="sr-v '+(ex.order_result?'g':'r')+'">'+(ex.order_result?'Yes':'No')+'</span></div>';
  H+='<div class="sr" style="border:none"><span class="sr-l">At</span><span class="sr-v" style="font-size:10px;color:var(--text-3)">'+age(ex.timestamp)+'</span></div>';
  id('exec-body').innerHTML=H;
  id('exec-sub').textContent=dir+' $'+fmt$(ex.size_usd);
}

// ── Rotator ──
async function rRot(){
  var d=await sf(API+'/rotator-hub');
  setDot(id('dot-rot'),d&&d.ok);
  if(!d||!d.hub){
    id('rot-body').innerHTML='<div class="em"><div class="em-ico">🔄</div>Rotator offline<div class="em-sub">service may be restarting</div></div>';
    id('rot-sub').textContent='—';
    return;
  }
  var hub=d.hub;
  var bal=hub.balances||{};
  var perf=hub.recent_performance||{};
  var side=hub.current_side||'—';
  var pv=hub.portfolio_value_usd;
  id('rot-sub').textContent=side+' $'+fmt$(pv);

  var H='<div style="display:grid;grid-template-columns:1fr 1fr;gap:0">';
  function sr(l,v,c){H+='<div class="sr"><span class="sr-l">'+l+'</span><span class="sr-v '+(c||'')+'">'+v+'</span></div>';}
  sr('Side',side,side==='CBBTC'?'g':side==='WETH'?'a':'');
  sr('Portfolio',pv!==undefined?'$'+fmt$(pv):'—','g');
  sr('CBBTC',bal.cbbtc?bal.cbbtc.toFixed(6)+' BTC':'0 BTC');
  sr('WETH',bal.weth?bal.weth.toFixed(6)+' ETH':'0 ETH');
  sr('USDC',bal.usdc!==undefined?'$'+bal.usdc.toFixed(2):'$0.00');
  sr('Trades',String(perf.trade_count||0));
  sr('Net PnL',fmt$(perf.usd_delta_total),(perf.usd_delta_total||0)>=0?'g':'r');
  sr('Status',hub.status||'—',hub.status==='live'?'g':'a');
  H+='</div>';
  id('rot-body').innerHTML=H;
}

// ── Rotator log ──
async function rLog(){
  var d=await sf(API+'/rotator-hub');
  if(!d){
    id('log-body').innerHTML='<div class="em"><div class="em-ico">📊</div>Activity log unavailable</div>';
    id('log-sub').textContent='—';
    return;
  }
  var tl=d.timeline||[];
  id('log-sub').textContent=tl.length+' events';

  if(!tl.length){
    id('log-body').innerHTML='<div class="em"><div class="em-ico">📊</div>No activity logged</div>';
    return;
  }
  var H='';
  for(var i=Math.max(tl.length-50,0);i<tl.length;i++){
    var e=tl[i];
    var ev=e.type||'—';
    var evCls=ev==='ENTER'?'enter':ev==='EXIT'?'exit':ev==='ROTATE'?'rotate':'';
    var ts=e.ts?age(e.ts):'—';
    H+='<div class="log-line"><span class="ts2">'+ts+'</span><span class="ev '+evCls+'">'+ev+'</span> <span>'+(e.side_before||'')+' → '+(e.side_after||'')+'</span> <span style="color:var(--text-3)">'+(e.reason||'')+'</span></div>';
  }
  id('log-body').innerHTML=H;
}

// ── Tradier ──
async function rTrd(){
  var d=await sf(API+'/tradier-leaders');
  setDot(id('dot-trd'),d&&d.ok);
  if(!d){
    id('trd-body').innerHTML='<div class="em"><div class="em-ico">📋</div>Tradier offline<div class="em-sub">pipeline may not have run yet</div></div>';
    id('trd-sub').textContent='—';
    return;
  }
  var cs=d.ranked_candidates||[];
  id('trd-sub').textContent=cs.length?'Top '+Math.min(cs.length,10)+' of '+cs.length:'No candidates';

  if(!cs.length){
    id('trd-body').innerHTML='<div class="em"><div class="em-ico">📋</div>No leaders available</div>';
    return;
  }
  var H='<div class="tw sc"><table><thead><tr><th>#</th><th>Sym</th><th class="num">Strike</th><th>Type</th><th class="num">Mid</th><th class="num">Vol</th><th class="num">OI</th><th class="num">DTE</th><th class="num">Score</th></tr></thead><tbody>';
  var max=Math.min(cs.length,10);
  for(var i=0;i<max;i++){
    var c=cs[i];
    var vf=c.volume>=1000?(c.volume/1000).toFixed(1)+'k':c.volume;
    var oi=c.open_interest>=1000?(c.open_interest/1000).toFixed(1)+'k':c.open_interest;
    var sc=c.score||0;
    H+='<tr><td>'+(i+1)+'</td><td style="font-weight:600">'+c.symbol+'</td><td class="num">$'+c.strike+'</td><td>'+c.option_type+'</td><td class="num">$'+c.mid.toFixed(3)+'</td><td class="num">'+vf+'</td><td class="num">'+oi+'</td><td class="num">'+c.dte+'</td><td class="num" style="color:'+(sc>=75?'var(--green)':sc>=65?'var(--amber)':'var(--text-2)')+';font-weight:600">'+sc+'</td></tr>';
  }
  H+='</tbody></table></div>';
  id('trd-body').innerHTML=H;
}

// ── Positions ──
async function rPos(){
  var d=await sf(API+'/position-monitor');
  if(!d){
    id('pos-body').innerHTML='<div class="em"><div class="em-ico">💼</div>Position monitor offline</div>';
    id('pos-sub').textContent='—';
    return;
  }
  var pos=d.positions||[];
  if(!pos.length){
    id('pos-body').innerHTML='<div class="em"><div class="em-ico">📭</div>No open positions tracked<div class="em-sub">Fidelity positions not yet synced to this monitor</div></div>';
    id('pos-sub').textContent='None tracked';
    return;
  }
  id('pos-sub').textContent=pos.length+' position'+(pos.length>1?'s':'');

  var H='<div class="tw"><table><thead><tr><th>Account</th><th>Symbol</th><th class="num">Qty</th><th class="num">Entry</th><th class="num">Mid</th><th class="num">P&L</th><th class="num">P&L %</th><th>State</th></tr></thead><tbody>';
  for(var i=0;i<pos.length;i++){
    var p=pos[i];
    var dir=p.pnl_total>=0?'g':'r';
    H+='<tr><td>'+(p.account||'—')+'</td><td style="font-weight:600">'+(p.symbol||'—')+'</td><td class="num">'+(p.qty||0)+'</td><td class="num">$'+fmt$(p.entry_price)+'</td><td class="num">$'+fmt$(p.current_mid)+'</td><td class="num '+dir+'">'+fmt$(p.pnl_total)+'</td><td class="num '+dir+'">'+fmtPct(p.pnl_pct)+'</td><td><span class="ps '+(p.state||'active')+'">'+(p.state||'active')+'</span></td></tr>';
  }
  H+='</tbody></table></div>';
  id('pos-body').innerHTML=H;
}

// ── Service dots ──
function buildDots(){
  var H='';
  H+='<span class="svc-dot" id="dot-cfm"><span class="dot dot-off"></span>CFM</span>';
  H+='<span class="svc-dot" id="dot-rot"><span class="dot dot-off"></span>Rotator</span>';
  H+='<span class="svc-dot" id="dot-trd"><span class="dot dot-off"></span>Tradier</span>';
  id('svc-dots').innerHTML=H;
}

// ── Poll ──
async function poll(){
  await Promise.allSettled([rCFM(),rExec(),rRot(),rLog(),rTrd(),rPos()]);
}
buildDots();
poll();
setInterval(poll,15000);
</script>
</body>
</html>
