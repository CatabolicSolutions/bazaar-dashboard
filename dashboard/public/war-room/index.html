<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WAR ROOM — Trading Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --text-dim: #888;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #3b82f6;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 14px;
            line-height: 1.5;
            height: 100vh;
            overflow: hidden;
            padding: 16px;
        }
        .war-room {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            gap: 16px;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .account-summary {
            display: flex;
            gap: 24px;
            font-family: var(--font-mono);
        }
        .account-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .account-value {
            font-weight: 600;
            color: var(--green);
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 13px;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-body {
            padding: 16px;
            flex: 1;
            overflow: auto;
        }
        .health-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
        }
        .health-dot.red { background: var(--red); }
        .system-metrics {
            font-family: var(--font-mono);
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
        }
        .metric-label {
            color: var(--text-dim);
        }
        .metric-value {
            font-weight: 600;
        }
        .positions-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .position-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            font-family: var(--font-mono);
        }
        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .position-symbol {
            font-weight: 700;
            font-size: 15px;
        }
        .position-side {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: var(--blue);
        }
        .position-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        .detail-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .detail-value {
            font-size: 14px;
            font-weight: 600;
        }
        .position-actions {
            display: flex;
            justify-content: flex-end;
        }
        .btn-close {
            background: var(--red);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }
        .activity-panel {
            grid-column: 1 / -1;
            height: 200px;
        }
        .activity-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            font-size: 13px;
        }
        .activity-table th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .activity-table td {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .activity-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .quick-actions {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            justify-content: center;
        }
        .btn-action {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 6px;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-action:hover {
            background: rgba(255,255,255,0.05);
        }
        .btn-action.danger {
            border-color: var(--red);
            color: var(--red);
        }
        .btn-action.danger:hover {
            background: rgba(239,68,68,0.1);
        }
    </style>
</head>
<body>
    <div class="war-room">
        <div class="header-bar">
            <div class="account-summary">
                <div class="account-item">
                    <span>Account:</span>
                    <span class="account-value" id="account-usdc">$168 USDC</span>
                    <span>+</span>
                    <span class="account-value" id="account-weth">$85 WETH</span>
                </div>
                <div class="account-item">
                    <span>P&L Today:</span>
                    <span class="account-value" id="pnl-today">+$0.00</span>
                </div>
            </div>
            <div class="clock" id="clock">--:--:--</div>
        </div>

        <div class="main-grid">
            <!-- TRADIER Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>TRADIER</span>
                    <div class="health-dot" id="tradier-health"></div>
                </div>
                <div class="panel-body">
                    <div class="system-metrics">
                        <div class="metric-row">
                            <span class="metric-label">BP</span>
                            <span class="metric-value" id="tradier-bp">$150</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Positions</span>
                            <span class="metric-value" id="tradier-positions">0</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Orders</span>
                            <span class="metric-value" id="tradier-orders">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BLOC Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>BLOC</span>
                    <div class="health-dot" id="bloc-health"></div>
                </div>
                <div class="panel-body">
                    <div class="system-metrics">
                        <div class="metric-row">
                            <span class="metric-label">USDC</span>
                            <span class="metric-value" id="bloc-usdc">$168</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">WETH</span>
                            <span class="metric-value" id="bloc-weth">$85</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Positions</span>
                            <span class="metric-value" id="bloc-positions">1</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ACTIVE POSITIONS Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>ACTIVE POSITIONS</span>
                </div>
                <div class="panel-body" id="positions-container">
                    <!-- Position cards will be inserted here -->
                    <div class="position-card">
                        <div class="position-header">
                            <span class="position-symbol">WETH Long</span>
                            <span class="position-side">Buy</span>
                        </div>
                        <div class="position-details">
                            <div class="detail-item">
                                <span class="detail-label">Entry</span>
                                <span class="detail-value">$2367</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">P&L</span>
                                <span class="detail-value" style="color: var(--green);">+$1.23</span>
                            </div>
                        </div>
                        <div class="position-actions">
                            <button class="btn-close">Close</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RECENT ACTIVITY Panel -->
            <div class="panel activity-panel">
                <div class="panel-header">
                    <span>RECENT ACTIVITY (last 10 trades)</span>
                </div>
                <div class="panel-body">
                    <table class="activity-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>System</th>
                                <th>Symbol</th>
                                <th>Side</th>
                                <th>P&L</th>
                            </tr>
                        </thead>
                        <tbody id="activity-table-body">
                            <tr>
                                <td>23:45</td>
                                <td>Bloc</td>
                                <td>WETH</td>
                                <td>Buy</td>
                                <td>--</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <button class="btn-action" id="btn-pause-bloc">Pause Bloc</button>
            <button class="btn-action" id="btn-pause-tradier">Pause Tradier</button>
            <button class="btn-action danger" id="btn-close-all">Emergency Close All</button>
        </div>
    </div>

    <script src="./app.js"></script>
</body>
</html>
